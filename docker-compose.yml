version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eventbook
      POSTGRES_PASSWORD: eventbook
      POSTGRES_DB: eventbook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
